<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline · Samkran Ilm</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .offline-container {
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }
        
        .offline-card {
            background: #1a2436;
            border-radius: 40px;
            padding: 3rem 2rem;
            border: 1px solid #2d3a4f;
            max-width: 500px;
        }
        
        .offline-icon {
            font-size: 5rem;
            margin-bottom: 1rem;
        }
        
        .offline-title {
            font-size: 2rem;
            color: #facc15;
            margin-bottom: 1rem;
        }
        
        .offline-text {
            color: #94a3b8;
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        
        .offline-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .offline-btn {
            background: #2d3a4f;
            border: none;
            color: white;
            padding: 0.8rem 2rem;
            border-radius: 40px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
        }
        
        .offline-btn:hover {
            background: #facc15;
            color: #0f172a;
        }
        
        .offline-btn.primary {
            background: #facc15;
            color: #0f172a;
        }
        
        .offline-btn.primary:hover {
            background: #ffd966;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="offline-container">
            <div class="offline-card">
                <div class="offline-icon">📡</div>
                <h1 class="offline-title">You're Offline</h1>
                <p class="offline-text">
                    Don't worry! You can still access your downloaded content.<br>
                    Juz 'Amma audio and basic features are available offline.
                </p>
                <div class="offline-actions">
                    <a href="index.html" class="offline-btn">Go Home</a>
                    <a href="juzAmma.html" class="offline-btn primary">Listen to Quran</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
